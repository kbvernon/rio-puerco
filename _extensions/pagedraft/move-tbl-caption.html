<script>
    // move quarto figure captions to table captions
    // so paged.js can handle them correctly
    function moveCaption() {
        const figures = document.querySelectorAll('figure.quarto-float-tbl');

        figures.forEach(figure => {
            const figcaption = figure.querySelector('figcaption');

            if (!figcaption) return;

            const table = figure.querySelector('table.table');

            if (table) {
                let caption = table.querySelector('caption');

                if (!caption) {
                    caption = document.createElement('caption');
                    table.insertBefore(caption, table.firstChild);
                }

                caption.textContent = figcaption.textContent;

                figcaption.remove();
            }
        });
    }

    // Call the function
    moveCaption();
</script>
